{% extends "base.html" %}
{% block title %}Add Product — MiniShop Admin{% endblock %}
{% block page_title %}Add Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-body p-4">
                <h5 class="mb-4"><i class="bi bi-box-seam-fill text-primary"></i> New Product</h5>
                <form method="POST" action="{{ url_for('add_product') }}">
                    <div class="mb-3">
                        <label for="product_name" class="form-label">Product Name</label>
                        <input type="text" class="form-control" id="product_name"
                               name="product_name" placeholder="e.g. Wireless Mouse" required>
                    </div>

                    <div class="mb-3">
                        <label for="category_id" class="form-label">Category</label>
                        <select class="form-select" id="category_id" name="category_id" required>
                            <option value="" disabled selected>Select a category</option>
                            {% for category in categories %}
                                <option value="{{ category.category_id }}">{{ category.category_name }}</option>
                            {% endfor %}
                        </select>
                        {% if categories|length == 0 %}
                            <div class="form-text text-danger">
                                No categories exist yet. <a href="{{ url_for('add_category') }}">Add one first</a>.
                            </div>
                        {% endif %}
                    </div>

                    <div class="mb-3">
                        <label for="price" class="form-label">Price (₹)</label>
                        <input type="number" step="0.01" min="0" class="form-control" id="price"
                               name="price" placeholder="e.g. 999.00" required>
                    </div>

                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" role="switch" id="status"
                               name="status" checked>
                        <label class="form-check-label" for="status">Active (visible to customers)</label>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-circle"></i> Save Product
                        </button>
                        <a href="{{ url_for('product_list') }}" class="btn btn-outline-secondary px-4">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
