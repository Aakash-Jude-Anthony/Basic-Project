{% extends "base.html" %}
{% block title %}Add Category — MiniShop Admin{% endblock %}
{% block page_title %}Add Category{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body p-4">
                <h5 class="mb-4"><i class="bi bi-tag-fill text-primary"></i> New Category</h5>
                <form method="POST" action="{{ url_for('add_category') }}">
                    <div class="mb-3">
                        <label for="category_name" class="form-label">Category Name</label>
                        <input type="text" class="form-control" id="category_name"
                               name="category_name" placeholder="e.g. Electronics" required>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-circle"></i> Save Category
                        </button>
                        <a href="{{ url_for('category_list') }}" class="btn btn-outline-secondary px-4">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
