{% extends "base.html" %}
{% block title %}Edit Product — MiniShop Admin{% endblock %}
{% block page_title %}Edit Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-body p-4">
                <h5 class="mb-4"><i class="bi bi-pencil-square text-primary"></i> Edit Product</h5>
                <form method="POST" action="{{ url_for('edit_product', product_id=product.product_id) }}">
                    <div class="mb-3">
                        <label for="product_name" class="form-label">Product Name</label>
                        <input type="text" class="form-control" id="product_name"
                               name="product_name" value="{{ product.product_name }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="category_id" class="form-label">Category</label>
                        <select class="form-select" id="category_id" name="category_id" required>
                            {% for category in categories %}
                                <option value="{{ category.category_id }}"
                                    {% if category.category_id == product.category_id %}selected{% endif %}>
                                    {{ category.category_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="price" class="form-label">Price (₹)</label>
                        <input type="number" step="0.01" min="0" class="form-control" id="price"
                               name="price" value="{{ product.price }}" required>
                    </div>

                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" role="switch" id="status"
                               name="status" {% if product.status == 1 %}checked{% endif %}>
                        <label class="form-check-label" for="status">Active (visible to customers)</label>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-circle"></i> Update Product
                        </button>
                        <a href="{{ url_for('product_list') }}" class="btn btn-outline-secondary px-4">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
