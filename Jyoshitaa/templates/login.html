<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | E-Commerce</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body class="login-page">

<div class="login-container">
  <div class="login-card">
    <div class="login-logo">🛒</div>
    <h1>E-Commerce Admin</h1>
    <p class="login-subtitle">Sign in to your account</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="admin@shop.com" required class="form-control"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required class="form-control"/>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>

    <div class="login-hint">
      <p>Admin: admin@shop.com / admin123</p>
      <p>User: user@shop.com / user123</p>
    </div>
  </div>
</div>

</body>
</html>
