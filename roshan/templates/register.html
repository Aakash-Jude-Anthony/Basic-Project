<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Catalog MGR</title>
  <style>
    :root {
      --bg: #F7F8FA; --surface: #fff; --border: #E2E6EF;
      --accent: #4F6EF7; --danger: #E84545; --success: #27AE60;
      --text: #1A1D2E; --muted: #7A8099; --radius: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap { width: 100%; max-width: 400px; padding: 20px; }
    .brand { text-align: center; margin-bottom: 28px; }
    .brand h1 { font-size: 24px; font-weight: 800; color: var(--text); }
    .brand h1 span { color: var(--accent); }
    .brand p { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      padding: 32px;
    }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px; color: var(--text);
      background: var(--bg); outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); background: #fff; }
    .btn {
      width: 100%; padding: 11px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 14px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .flash { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; margin-bottom: 16px; }
    .flash.success { background: #E8F8EF; color: #1A7A43; border-left: 4px solid var(--success); }
    .flash.error   { background: #FEE8E8; color: #A52828; border-left: 4px solid var(--danger); }
    .login-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
    .login-link a { color: var(--accent); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <h1>Catalog <span>MGR</span></h1>
    <p>Create a new account</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Choose a username" required autofocus/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Choose a password" required/>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm"
               placeholder="Repeat your password" required/>
      </div>
      <button type="submit" class="btn">Create Account</button>
    </form>
  </div>

  <div class="login-link">
    Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
  </div>
</div>
</body>
</html>
