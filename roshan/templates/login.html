<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Catalog MGR</title>
  <style>
    :root {
      --bg: #F7F8FA; --surface: #fff; --border: #E2E6EF;
      --accent: #4F6EF7; --danger: #E84545; --success: #27AE60;
      --text: #1A1D2E; --muted: #7A8099; --radius: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand h1 { font-size: 24px; font-weight: 800; color: var(--text); }
    .brand h1 span { color: var(--accent); }
    .brand p { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      padding: 32px;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); background: #fff; }
    .btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .flash {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
    }
    .flash.success { background: #E8F8EF; color: #1A7A43; border-left: 4px solid var(--success); }
    .flash.error   { background: #FEE8E8; color: #A52828; border-left: 4px solid var(--danger); }

    .hint {
      margin-top: 20px;
      padding: 12px;
      background: #F0F3FF;
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .hint strong { color: var(--accent); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <h1>Catalog <span>MGR</span></h1>
    <p>Sign in to manage your catalog</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Enter username" required autofocus/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>

  <div class="hint">
    Default admin → <strong>admin</strong> / <strong>admin123</strong>
  </div>
  <div style="text-align:center; margin-top:16px; font-size:13px; color:var(--muted);">
    Don't have an account?
    <a href="{{ url_for('register') }}"
       style="color:var(--accent); font-weight:600; text-decoration:none;">Register</a>
  </div>
</div>
</body>
</html>
