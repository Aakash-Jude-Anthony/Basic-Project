{% extends "base.html" %}
{% block title %}{{ action }} Category — Catalog MGR{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>{{ action }} Category</h1>
    <p>{{ 'Update category details' if action == 'Edit' else 'Create a new product category' }}</p>
  </div>
</div>

<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label for="name">Category Name</label>
      <input type="text" id="name" name="name"
             placeholder="e.g. Electronics"
             value="{{ category.name if category else '' }}"
             required autofocus />
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" name="status">
        <option value="Active"
          {{ 'selected' if not category or category.status == 'Active' }}>Active</option>
        <option value="Inactive"
          {{ 'selected' if category and category.status == 'Inactive' }}>Inactive</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        {{ 'Save Changes' if action == 'Edit' else 'Add Category' }}
      </button>
      <a href="{{ url_for('categories') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
