{% extends "base.html" %}
{% block title %}{{ action }} User — Catalog MGR{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>{{ action }} User</h1>
    <p>{{ 'Update user credentials and role' if action == 'Edit' else 'Create a new user account' }}</p>
  </div>
</div>

<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             placeholder="e.g. john_doe"
             value="{{ user.username if user else '' }}"
             required autofocus/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="text" id="password" name="password"
             placeholder="Enter password"
             value="{{ user.password if user else '' }}"
             required/>
    </div>

    <div class="form-group">
      <label for="role">Role</label>
      <select id="role" name="role">
        <option value="user"  {{ 'selected' if not user or user.role == 'user' }}>User (view only)</option>
        <option value="admin" {{ 'selected' if user and user.role == 'admin' }}>Admin (full access)</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        {{ 'Save Changes' if action == 'Edit' else 'Add User' }}
      </button>
      <a href="{{ url_for('users') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
